controllers:
  qbittorrent:
    containers:
      gluetun:
        image:
          repository: ghcr.io/qdm12/gluetun
          tag: "v3.40.0"
        env:
          VPN_SERVICE_PROVIDER: custom
          VPN_TYPE: wireguard
          WIREGUARD_PRIVATE_KEY: "{{ requiredEnv \"WIREGUARD_PRIVATE_KEY\" }}"
          WIREGUARD_ADDRESSES: "{{ requiredEnv \"WIREGUARD_ADDRESSES\" }}"
          VPN_ENDPOINT_IP: "{{ requiredEnv \"VPN_ENDPOINT_IP\" }}"
          VPN_ENDPOINT_PORT: "{{ requiredEnv \"VPN_ENDPOINT_PORT\" }}"
          WIREGUARD_PUBLIC_KEY: "{{ requiredEnv \"WIREGUARD_PUBLIC_KEY\" }}"
          FIREWALL_INPUT_PORTS: "8080"
          # k3s default pod/service CIDRs - adjust if your cluster uses different ranges
          FIREWALL_OUTBOUND_SUBNETS: "10.42.0.0/16,10.43.0.0/16"
          DOT: "off"
          HEALTH_VPN_DURATION_INITIAL: 30s
        securityContext:
          capabilities:
            add:
              - NET_ADMIN
          runAsUser: 0
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi

      app:
        image:
          repository: ghcr.io/linuxserver/qbittorrent
          tag: "5.0.3"
        env:
          PUID: "1000"
          PGID: "1000"
          TZ: Europe/Paris
          WEBUI_PORT: "8080"
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        dependsOn: gluetun

service:
  app:
    controller: qbittorrent
    ports:
      http:
        port: 8080

persistence:
  config:
    type: persistentVolumeClaim
    storageClass: local-config
    accessMode: ReadWriteOnce
    size: 1Gi
    globalMounts:
      - path: /config
        container: app
  # Single shared NFS PVC — same filesystem as Radarr/Sonarr library for hardlinks.
  # Configure qBittorrent to save downloads to /data/torrents/
  data:
    type: persistentVolumeClaim
    existingClaim: media-data-pvc
    globalMounts:
      - path: /data
        container: app

ingress:
  app:
    enabled: true
    className: caddy
    annotations:
      # Authentik forward auth — internal auth is disabled on this service
      caddy.ingress.kubernetes.io/server-snippet: |
        forward_auth http://authentik-server.auth.svc.cluster.local:9000 {
          uri /outpost.goauthentik.io/auth/caddy
          copy_headers X-Authentik-Username X-Authentik-Groups X-Authentik-Email X-Authentik-Uid X-Authentik-Jwt X-Authentik-Meta-jwks X-Authentik-Meta-outpost X-Authentik-Meta-provider X-Authentik-Meta-app X-Authentik-Meta-version
          @goauthentik_proxy_response status 401
          handle @goauthentik_proxy_response {
            redir * /outpost.goauthentik.io/start?rd={http.request.uri}
          }
        }
    hosts:
      - host: "qbittorrent.{{ requiredEnv \"DOMAIN\" }}"
        paths:
          - path: /
            pathType: Prefix
