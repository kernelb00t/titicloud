resources:
  # Configure k3s's built-in Traefik with Let's Encrypt ACME.
  # This HelmChartConfig is applied to kube-system and picked up by k3s's helm-controller,
  # which re-deploys Traefik with the new values.
  - apiVersion: helm.cattle.io/v1
    kind: HelmChartConfig
    metadata:
      name: traefik
      namespace: kube-system
    spec:
      valuesContent: |-
        additionalArguments:
          - "--certificatesresolvers.letsencrypt.acme.email={{ requiredEnv "ACME_EMAIL" }}"
          - "--certificatesresolvers.letsencrypt.acme.storage=/data/acme.json"
          - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
        # Persist ACME certificates across Traefik restarts
        persistence:
          enabled: true
          storageClass: local-config
          size: 128Mi
        # Expose to host network so port 80/443 bind directly on the NUC
        # Adjust if your cluster uses non-standard pod/service CIDRs
        ports:
          web:
            hostPort: 80
            redirectTo:
              port: websecure
          websecure:
            hostPort: 443

  # Authentik ForwardAuth Middleware — used by radarr, sonarr, prowlarr, qbittorrent.
  # Reference in Ingress annotations as:
  #   traefik.ingress.kubernetes.io/router.middlewares: kube-system-authentik-forwardauth@kubernetescrd
  # NOTE: The forwardAuth address uses HTTPS — Authentik's Ingress must be healthy with a valid
  # TLS certificate before the middleware will work. During initial bootstrap, deploy and verify
  # Authentik first before enabling forward auth on other services.
  - apiVersion: traefik.io/v1alpha1
    kind: Middleware
    metadata:
      name: authentik-forwardauth
      namespace: kube-system
    spec:
      forwardAuth:
        address: "https://auth.{{ requiredEnv "DOMAIN" }}/outpost.goauthentik.io/auth/traefik"
        trustForwardHeader: true
        authResponseHeaders:
          - X-authentik-username
          - X-authentik-groups
          - X-authentik-email
          - X-authentik-uid
          - X-authentik-jwt
          - X-authentik-meta-jwks
          - X-authentik-meta-outpost
          - X-authentik-meta-provider
          - X-authentik-meta-app
          - X-authentik-meta-version
