persistence:
  config:
    enabled: true
    storageClass: local-config
    size: 5Gi
  media:
    enabled: true
    existingClaim: media-data-pvc

ingress:
  enabled: true
  ingressClassName: caddy
  annotations: {}
  hosts:
    - host: "jellyfin.{{ requiredEnv \"DOMAIN\" }}"
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: 4000m
    memory: 4Gi
