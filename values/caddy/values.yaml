ingressController:
  config:
    email: "{{ requiredEnv \"ACME_EMAIL\" }}"
    acmeCA: https://acme-v02.api.letsencrypt.org/directory
    onDemandTLS: false
    proxyProtocol: false
    replicaCount: 1
    logLevel: "INFO"

# Bind directly to host ports 80/443 — no MetalLB required
hostNetwork: true

service:
  type: ClusterIP

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi
