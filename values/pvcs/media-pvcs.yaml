# PVCs for media/photos services using nfs-media StorageClass
# These PVCs are excluded from Velero backups (large media files)
# Format: bjw-s/raw chart resources list
#
# Directory layout expected on NFS (configure on Synology before first deploy):
#   /data/torrents/   ← qBittorrent downloads
#   /data/movies/     ← Radarr library  (configure as root folder in Radarr UI)
#   /data/tv/         ← Sonarr library  (configure as root folder in Sonarr UI)
#
# Jellyfin mounts the same media-data-pvc at /media (chart default), so its
# library paths are /media/movies and /media/tv — configure these in the Jellyfin UI.
#
# Hardlinks work because *arr, qBittorrent and Jellyfin all use the same underlying
# NFS filesystem (media-data-pvc). The mount path per container is irrelevant for
# hardlink support; only the filesystem identity matters.
resources:
  # Single shared NFS claim for all media + downloads (hardlink support)
  - apiVersion: v1
    kind: PersistentVolumeClaim
    metadata:
      name: media-data-pvc
      namespace: media
      annotations:
        velero.io/exclude-from-backup: "true"
    spec:
      accessModes:
        - ReadWriteMany
      storageClassName: nfs-media
      resources:
        requests:
          storage: 1Ti

  - apiVersion: v1
    kind: PersistentVolumeClaim
    metadata:
      name: immich-library-pvc
      namespace: photos
      annotations:
        velero.io/exclude-from-backup: "true"
    spec:
      accessModes:
        - ReadWriteMany
      storageClassName: nfs-media
      resources:
        requests:
          storage: 500Gi
