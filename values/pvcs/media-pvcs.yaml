# PVCs for media services using nfs-media StorageClass
# These PVCs are excluded from Velero backups (large media files)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jellyfin-media-pvc
  namespace: media
  annotations:
    velero.io/exclude-from-backup: "true"
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: nfs-media
  resources:
    requests:
      storage: 500Gi
---
