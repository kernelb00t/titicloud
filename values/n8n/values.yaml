controllers:
  n8n:
    containers:
      app:
        image:
          repository: n8nio/n8n
          tag: "1.68.0"
        env:
          DB_TYPE: postgresdb
          DB_POSTGRESDB_HOST: "{{ requiredEnv \"N8N_DB_HOST\" }}"
          DB_POSTGRESDB_DATABASE: n8n
          DB_POSTGRESDB_USER: n8n
          DB_POSTGRESDB_PASSWORD: "{{ requiredEnv \"N8N_DB_PASSWORD\" }}"
          N8N_ENCRYPTION_KEY: "{{ requiredEnv \"N8N_ENCRYPTION_KEY\" }}"
          N8N_HOST: "n8n.{{ requiredEnv \"DOMAIN\" }}"
          WEBHOOK_URL: "https://n8n.{{ requiredEnv \"DOMAIN\" }}"
          N8N_PROTOCOL: https
          GENERIC_TIMEZONE: Europe/Paris
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 1Gi

service:
  app:
    controller: n8n
    ports:
      http:
        port: 5678

persistence:
  data:
    type: persistentVolumeClaim
    storageClass: local-config
    accessMode: ReadWriteOnce
    size: 2Gi
    globalMounts:
      - path: /home/node/.n8n

ingress:
  app:
    enabled: false
