environments:
  homelab:
    values:
      - environments/homelab.yaml

---

helmDefaults:
  wait: true
  timeout: 600
  createNamespace: true

repositories:
  - name: cnpg
    url: https://cloudnative-pg.github.io/charts
  - name: vmware-tanzu
    url: https://vmware-tanzu.github.io/helm-charts
  - name: nfs-subdir
    url: https://kubernetes-sigs.github.io/nfs-subdir-external-provisioner
  - name: piraeus
    url: https://piraeus.io/helm-charts
  - name: goauthentik
    url: https://charts.goauthentik.io
  - name: immich
    url: https://immich-app.github.io/immich-charts
  - name: bjw-s
    url: https://bjw-s.github.io/helm-charts
  - name: jellyfin
    url: https://jellyfin.github.io/jellyfin-helm

helmfiles:
  # 1. Infrastructure operators (order matters)
  - path: releases/infra/nfs-provisioner.yaml
  - path: releases/infra/snapshot-controller.yaml
  - path: releases/infra/snapshot-class.yaml
  - path: releases/infra/cnpg-operator.yaml
  - path: releases/infra/velero.yaml
  - path: releases/infra/caddy.yaml
  - path: releases/infra/media-pvcs.yaml

  # 2. Auth namespace: DB first, then app
  - path: releases/auth/authentik-db.yaml
  - path: releases/auth/authentik.yaml

  # 3. Photos namespace: DB first, then app
  - path: releases/photos/immich-db.yaml
  - path: releases/photos/immich.yaml

  # 4. Productivity namespace: DBs first, then apps
  - path: releases/productivity/affine-db.yaml
  - path: releases/productivity/affine.yaml
  - path: releases/productivity/n8n-db.yaml
  - path: releases/productivity/n8n.yaml
  - path: releases/productivity/vaultwarden.yaml

  # 5. Media namespace
  - path: releases/media/jellyfin.yaml
  - path: releases/media/jellyseerr.yaml
  - path: releases/media/qbittorrent.yaml
  - path: releases/media/radarr.yaml
  - path: releases/media/sonarr.yaml
  - path: releases/media/prowlarr.yaml
  - path: releases/media/flaresolverr.yaml
