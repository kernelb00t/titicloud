metadata_dir = "/var/lib/garage/meta"
data_dir = "/var/lib/garage/data"
db_engine = "sqlite"

# Very important for a single node setup on a Synology NAS
replication_factor = 1

# RPC interface definition
rpc_bind_addr = "[::]:3901"
rpc_public_addr = "127.0.0.1:3901"

# The RPC secret will be retrieved dynamically from the GARAGE_RPC_SECRET environment variable
# rpc_secret = "..."

[s3_api]
s3_region = "garage"
api_bind_addr = "[::]:3900"
root_domain = "s3.thivillon.org"

