version: 2
updates:
  # Keep Helm chart versions up to date
  - package-ecosystem: "helm"
    directory: "/releases/infra"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(helm)"
    labels:
      - "dependencies"

  - package-ecosystem: "helm"
    directory: "/releases/auth"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(helm)"
    labels:
      - "dependencies"

  - package-ecosystem: "helm"
    directory: "/releases/media"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(helm)"
    labels:
      - "dependencies"

  - package-ecosystem: "helm"
    directory: "/releases/photos"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(helm)"
    labels:
      - "dependencies"

  - package-ecosystem: "helm"
    directory: "/releases/productivity"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(helm)"
    labels:
      - "dependencies"

  # Keep GitHub Actions up to date (if any are added later)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(ci)"
    labels:
      - "dependencies"
