version: 2
updates:
  # Keep GitHub Actions up to date (if any are added later).
  # Helm chart and Docker image versions are managed by Renovate Bot (renovate.json).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(ci)"
    labels:
      - "dependencies"
