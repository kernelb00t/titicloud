apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sonarr
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://bjw-s-labs.github.io/helm-charts'
    chart: app-template
    targetRevision: 5.0.0
    helm:
      values: |
        controllers:
          main:
            strategy: Recreate
            containers:
              main:
                image:
                  repository: lscr.io/linuxserver/sonarr
                  # renovate: datasource=docker depName=lscr.io/linuxserver/sonarr
                  tag: "4.0.17"
                ports:
                  - name: http
                    containerPort: 8989
                env:
                  TZ: "UTC"
                  PUID: "1000"
                  PGID: "1000"
                resources:
                  requests:
                    cpu: 50m
                    memory: 256Mi
                  limits:
                    memory: 1Gi
                probes:
                  liveness:
                    enabled: true
                  readiness:
                    enabled: true

        service:
          main:
            controller: main
            ports:
              http:
                port: 8989

        ingress:
          main:
            enabled: true
            className: traefik
            annotations:
              traefik.ingress.kubernetes.io/router.tls: "true"
              traefik.ingress.kubernetes.io/router.tls.certresolver: "letsencrypt"
              traefik.ingress.kubernetes.io/router.middlewares: "media-security-headers@kubernetescrd,media-auth-authentik@kubernetescrd"
            hosts:
              - host: "sonarr.thivillon.org"
                paths:
                  - path: /
                    pathType: Prefix
                    service:
                      identifier: main
                      port: http

        persistence:
          config:
            enabled: true
            storageClass: local-config
            accessMode: ReadWriteOnce
            size: 5Gi
            globalMounts:
              - path: /config
          media:
            enabled: true
            existingClaim: media-data-pvc
            globalMounts:
              - path: /data
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: media
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
  ignoreDifferences:
  - kind: PersistentVolumeClaim
    jsonPointers:
    - /spec/volumeName
