apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prowlarr
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://bjw-s-labs.github.io/helm-charts'
    chart: app-template
    targetRevision: 4.6.2
    helm:
      values: |
        controllers:
          main:
            strategy: Recreate
            containers:
              main:
                image:
                  repository: lscr.io/linuxserver/prowlarr
                  tag: "2.3.5"
                ports:
                - name: http
                  containerPort: 9696
                env:
                  TZ: "UTC"
                  PUID: "1000"
                  PGID: "1000"
                resources:
                  requests:
                    cpu: 25m
                    memory: 128Mi
                  limits:
                    memory: 512Mi
                probes:
                  liveness:
                    enabled: true
                  readiness:
                    enabled: true

        service:
          main:
            controller: main
            ports:
              http:
                port: 9696

        ingress:
          main:
            enabled: true
            className: traefik
            annotations:
              traefik.ingress.kubernetes.io/router.tls: "true"
              traefik.ingress.kubernetes.io/router.tls.certresolver: "letsencrypt"
              traefik.ingress.kubernetes.io/router.middlewares: "media-security-headers@kubernetescrd,media-auth-authentik@kubernetescrd"
            hosts:
            - host: "prowlarr.thivillon.org"
              paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: main
                  port: http

        persistence:
          config:
            enabled: true
            storageClass: local-config
            accessMode: ReadWriteOnce
            size: 2Gi
            globalMounts:
            - path: /config
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: media
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
  ignoreDifferences:
  - kind: PersistentVolumeClaim
    jsonPointers:
    - /spec/volumeName
