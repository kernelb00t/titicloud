apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: jellyfin
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://jellyfin.github.io/jellyfin-helm'
    chart: jellyfin
    targetRevision: 3.2.0
    helm:
      values: |
        image:
          repository: docker.io/jellyfin/jellyfin
          tag: "10.11.8"

        jellyfin:
          env:
            - name: TZ
              value: "UTC"
            - name: JELLYFIN_PublishedServerUrl
              value: "https://flix.thivillon.org"

        ingress:
          enabled: true
          className: traefik
          annotations:
            traefik.ingress.kubernetes.io/router.tls: "true"
            traefik.ingress.kubernetes.io/router.tls.certresolver: "letsencrypt"
          hosts:
            - host: "flix.thivillon.org"
              paths:
                - path: /
                  pathType: Prefix

        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            memory: 6Gi

        strategy:
          type: Recreate

        persistence:
          config:
            enabled: true
            existingClaim: jellyfin-config
          media:
            enabled: true
            type: pvc
            existingClaim: media-data-pvc
          cache:
            enabled: true
            type: pvc
            existingClaim: jellyfin-cache
            mountPath: /cache

        podSecurityContext:
          supplementalGroups: [993, 44]

        securityContext:
          privileged: true

        volumes:
          - name: hwa
            hostPath:
              path: /dev/dri

        volumeMounts:
          - name: hwa
            mountPath: /dev/dri
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: media
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
  ignoreDifferences:
  - kind: PersistentVolumeClaim
    jsonPointers:
    - /spec/volumeName
