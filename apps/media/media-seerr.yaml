apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: seerr
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://bjw-s-labs.github.io/helm-charts'
    chart: app-template
    targetRevision: 4.6.2
    helm:
      values: |
        controllers:
          main:
            strategy: Recreate
            containers:
              main:
                image:
                  repository: docker.io/fallenbagel/jellyseerr
                  tag: "preview-OIDC"
                env:
                  TZ: "UTC"
                  LOG_LEVEL: "info"
                resources:
                  requests:
                    cpu: 10m
                    memory: 128Mi
                  limits:
                    memory: 512Mi
                probes:
                  liveness:
                    enabled: true
                  readiness:
                    enabled: true

        service:
          main:
            controller: main
            ports:
              http:
                port: 5055

        ingress:
          main:
            enabled: true
            className: traefik
            annotations:
              traefik.ingress.kubernetes.io/router.tls: "true"
              traefik.ingress.kubernetes.io/router.tls.certresolver: "letsencrypt"
            hosts:
              - host: "req.thivillon.org"
                paths:
                  - path: /
                    pathType: Prefix
                    service:
                      identifier: main
                      port: http

        persistence:
          config:
            enabled: true
            storageClass: local-config
            accessMode: ReadWriteOnce
            size: 5Gi
            globalMounts:
              - path: /app/config
          media:
            enabled: true
            existingClaim: media-data-pvc
            globalMounts:
              - path: /data
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: media
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
  ignoreDifferences:
  - kind: PersistentVolumeClaim
    jsonPointers:
    - /spec/volumeName
