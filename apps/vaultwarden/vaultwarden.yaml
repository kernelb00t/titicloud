apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vaultwarden
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://bjw-s-labs.github.io/helm-charts'
    chart: app-template
    targetRevision: 4.6.2
    helm:
      values: |
        controllers:
          vaultwarden:
            strategy: Recreate
            containers:
              app:
                image:
                  repository: ghcr.io/dani-garcia/vaultwarden
                  # renovate: datasource=docker depName=ghcr.io/dani-garcia/vaultwarden
                  tag: "1.36.0"
                env:
                  DOMAIN: "https://vault.thivillon.org"
                  SIGNUPS_ALLOWED: "false"
                # On charge le token d'admin depuis le SealedSecret
                envFrom:
                  - secretRef:
                      name: vaultwarden-secret
                resources:
                  requests:
                    cpu: 50m
                    memory: 64Mi
                  limits:
                    cpu: 200m
                    memory: 256Mi

        service:
          app:
            controller: vaultwarden
            ports:
              http:
                port: 80

        persistence:
          data:
            type: persistentVolumeClaim
            storageClass: local-config
            accessMode: ReadWriteOnce
            size: 1Gi
            globalMounts:
              - path: /data

        ingress:
          app:
            enabled: true
            className: traefik
            annotations:
              traefik.ingress.kubernetes.io/router.tls: "true"
              traefik.ingress.kubernetes.io/router.tls.certresolver: "letsencrypt"
            hosts:
              - host: "vault.thivillon.org"
                paths:
                  - path: /
                    pathType: Prefix
                    service:
                      identifier: app
                      port: http

  destination:
    server: 'https://kubernetes.default.svc'
    namespace: vaultwarden
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
  ignoreDifferences:
  - kind: PersistentVolumeClaim
    jsonPointers:
    - /spec/volumeName
