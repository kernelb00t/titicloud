apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: trek
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://mauriceboe.github.io/TREK'
    chart: trek
    targetRevision: '3.0.11'
    helm:
      values: |
        fullnameOverride: trek
        env:
          NODE_ENV: production
          PORT: "3000"
          TZ: "UTC"
          APP_URL: "https://trek.thivillon.org"
          ALLOWED_ORIGINS: "https://trek.thivillon.org"
          TRUST_PROXY: "1"
          COOKIE_SECURE: "true"

        strategy:
          type: Recreate

        existingSecret: "trek-secrets"

        persistence:
          enabled: true
          storageClass: local-config
          data:
            size: 1Gi
          uploads:
            size: 5Gi

        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi

        ingress:
          enabled: true
          className: traefik
          annotations:
            traefik.ingress.kubernetes.io/router.tls: "true"
            traefik.ingress.kubernetes.io/router.tls.certresolver: "letsencrypt"
          hosts:
            - host: "trek.thivillon.org"
              paths:
                - /
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: trek
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
  ignoreDifferences:
  - kind: PersistentVolumeClaim
    jsonPointers:
    - /spec/volumeName
